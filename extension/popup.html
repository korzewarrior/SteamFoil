<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="sf-popup">
        <div class="sf-header">
            <img src="icons/icon-48.png" alt="" class="sf-logo" width="24" height="24">
            <h1>SteamFoil</h1>
        </div>
        <div id="sf-status" class="sf-status">
            <p class="sf-checking">Checking…</p>
        </div>
        <div id="sf-actions" class="sf-actions" hidden>
            <button id="sf-reload" class="sf-btn">Force Reload</button>
        </div>
        <div class="sf-footer">
            <a href="https://github.com/korzewarrior/SteamFoil" target="_blank">GitHub</a>
            <span class="sf-sep">·</span>
            <a href="https://github.com/korzewarrior/SteamFoil/blob/main/CONTRIBUTING.md" target="_blank">Add Your Game</a>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
